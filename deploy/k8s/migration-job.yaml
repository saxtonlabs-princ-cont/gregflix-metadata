apiVersion: batch/v1
kind: Job
metadata:
  name: gregflix-metadata-migrate
  namespace: gregflix
  labels:
    app.kubernetes.io/name: gregflix-metadata
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gregflix-metadata
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: registry.home.arpa/gregflix-metadata:latest
          imagePullPolicy: Always
          command: ["python", "-m", "app", "migrate"]
          env:
            - name: GREGFLIX_METADATA_CONFIG
              value: /app/config/config.yaml
            - name: GREGFLIX_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gregflix-metadata-secrets
                  key: GREGFLIX_POSTGRES_PASSWORD
            - name: TMDB_READ_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gregflix-metadata-secrets
                  key: TMDB_READ_ACCESS_TOKEN
            - name: TMDB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gregflix-metadata-secrets
                  key: TMDB_API_KEY
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /app/config/config.yaml
              subPath: config.yaml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: gregflix-metadata-config

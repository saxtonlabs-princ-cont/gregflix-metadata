apiVersion: v1
kind: ConfigMap
metadata:
  name: gregflix-metadata-config
  namespace: gregflix
data:
  config.yaml: |
    postgres:
      host: gregflix-postgres.storage.svc.cluster.local
      port: 5432
      database: gregflix
      username: Admin
      password_env: GREGFLIX_POSTGRES_PASSWORD

    providers:
      tmdb:
        enabled: true
        base_url: https://api.themoviedb.org/3
        image_base_url: https://image.tmdb.org/t/p/original
        auth_mode: bearer_token
        read_access_token_env: TMDB_READ_ACCESS_TOKEN
        # For legacy v3 API key auth, set auth_mode: api_key and provide TMDB_API_KEY.
        api_key_env: TMDB_API_KEY

    image_storage:
      root_path: /srv/gregflix/meta

    artwork:
      preference: prefer_provider

    matching:
      confidence_threshold: 0.72
      ambiguity_delta: 0.05

    startup:
      scan_on_startup: false

    libraries:
      - name: Movies
        category: movies
        path: /srv/gregflix/media-p/movies
        enabled: true
      - name: Series
        category: series
        path: /srv/gregflix/media-p/series
        enabled: true
      - name: Anime
        category: anime
        path: /srv/gregflix/media-p/anime
        enabled: true
      - name: Documentaries
        category: documentaries
        path: /srv/gregflix/media-p/documentaries
        enabled: true

    scanner:
      success_marker: gf-meta-tag
      failure_marker: gf-meta-failed
      supported_extensions:
        - .mkv
        - .mp4
        - .m4v
        - .avi
        - .mov
        - .webm
        - .ts
        - .m2ts
